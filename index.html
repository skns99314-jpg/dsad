<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gobak</title>
    <style>
        /* Uzay Arka Planı ve Genel Ayarlar */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            user-select: none;
        }

        /* Yıldız Efektleri için Canvas */
        canvas#space {
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* Kocaman Başlık */
        .title-container {
            z-index: 1;
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            background: -webkit-linear-gradient(#fff, #a0c4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(160, 196, 255, 0.5);
            letter-spacing: 3px;
            font-weight: 900;
        }

        /* Orijinal Tarzda Dinazor Oyunu Alanı */
        #game-container {
            z-index: 1;
            background-color: #f7f7f7; /* Chrome'un klasik gri/beyaz arka planı */
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(255, 255, 255, 0.1);
            padding: 20px;
            position: relative;
        }

        canvas#dinoGame {
            background-color: transparent;
            display: block;
        }

        #game-over-text {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #535353;
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            font-weight: bold;
            display: none;
            text-align: center;
        }

        .info-text {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            color: #a0c4ff;
            text-shadow: 0 0 5px rgba(160, 196, 255, 0.8);
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <canvas id="space"></canvas>

    <div class="title-container">
        <h1>ELBET BİR GÜN AÇILACAK 🕊️</h1>
    </div>

    <div id="game-container">
        <div id="game-over-text">OYUN BİTTİ &nbsp; SEN BOTSUN KNK<br><span style="font-size: 14px; cursor:pointer;">Tekrar oynamak için tıkla</span></div>
        <canvas id="dinoGame" width="600" height="150"></canvas>
        <div class="info-text">Zıplamak için Ekrana tıkla knk tmmi??? 🙂😖😣!</div>
    </div>

    <script>
        // --- UZAY ARKA PLAN EFEKTİ ---
        const spaceCanvas = document.getElementById('space');
        const sCtx = spaceCanvas.getContext('2d');
        spaceCanvas.width = window.innerWidth;
        spaceCanvas.height = window.innerHeight;

        const stars = [];
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * spaceCanvas.width,
                y: Math.random() * spaceCanvas.height,
                radius: Math.random() * 1.5,
                speed: Math.random() * 0.5 + 0.1
            });
        }

        function drawSpace() {
            sCtx.clearRect(0, 0, spaceCanvas.width, spaceCanvas.height);
            sCtx.fillStyle = '#ffffff';
            stars.forEach(star => {
                sCtx.beginPath();
                sCtx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                sCtx.fill();
                
                // Yıldızları sola doğru hareket ettir (Uçuş hissi)
                star.x -= star.speed;
                if (star.x < 0) {
                    star.x = spaceCanvas.width;
                    star.y = Math.random() * spaceCanvas.height;
                }
            });
            requestAnimationFrame(drawSpace);
        }
        drawSpace();

        window.addEventListener('resize', () => {
            spaceCanvas.width = window.innerWidth;
            spaceCanvas.height = window.innerHeight;
        });

        // --- KLASİK DİNOZOR OYUNU KLONU ---
        const dinoCanvas = document.getElementById('dinoGame');
        const ctx = dinoCanvas.getContext('2d');
        const gameOverText = document.getElementById('game-over-text');

        // Oyun Değişkenleri
        let frames = 0;
        let score = 0;
        let isGameOver = false;
        let gameSpeed = 5;

        // Dinozor Özellikleri
        const dino = {
            x: 50,
            y: 100,
            width: 40,
            height: 43,
            dy: 0,
            gravity: 0.6,
            jumpPower: -10,
            isJumping: false,
            draw() {
                ctx.fillStyle = '#535353'; // Orijinal Chrome gri rengi
                // Basit bir dinozor şekli çizimi
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.fillRect(this.x + 20, this.y - 10, 20, 20); // Kafa
            },
            jump() {
                if (!this.isJumping) {
                    this.dy = this.jumpPower;
                    this.isJumping = true;
                }
            },
            update() {
                this.y += this.dy;
                this.dy += this.gravity;

                // Zemin sınırını kontrol et
                if (this.y >= 100) {
                    this.y = 100;
                    this.dy = 0;
                    this.isJumping = false;
                }
                this.draw();
            }
        };

        // Kaktüs (Engeller) Özellikleri
        const obstacles = [];
        class Cactus {
            constructor() {
                this.x = dinoCanvas.width;
                this.width = 20 + Math.random() * 15;
                this.height = 30 + Math.random() * 20;
                this.y = 143 - this.height;
            }
            draw() {
                ctx.fillStyle = '#535353';
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }
            update() {
                this.x -= gameSpeed;
                this.draw();
            }
        }

        // Çarpışma Kontrolü ve Oyunu Çizme
        function animateDinoGame() {
            if (isGameOver) return;
            requestAnimationFrame(animateDinoGame);
            ctx.clearRect(0, 0, dinoCanvas.width, dinoCanvas.height);

            // Zemin Çizgisi
            ctx.beginPath();
            ctx.moveTo(0, 143);
            ctx.lineTo(dinoCanvas.width, 143);
            ctx.strokeStyle = '#535353';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Skor Yazısı
            ctx.fillStyle = '#535353';
            ctx.font = '20px Courier New';
            ctx.fillText(Math.floor(score).toString().padStart(5, '0'), 520, 30);

            dino.update();

            // Engel Oluşturma
            if (frames % 100 === 0) {
                obstacles.push(new Cactus());
            }

            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].update();

                // Çarpışma Kontrolü (Hitbox)
                if (dino.x < obstacles[i].x + obstacles[i].width &&
                    dino.x + dino.width > obstacles[i].x &&
                    dino.y < obstacles[i].y + obstacles[i].height &&
                    dino.y + dino.height > obstacles[i].y) {
                    
                    isGameOver = true;
                    gameOverText.style.display = 'block';
                }

                // Ekrandan çıkan kaktüsü sil
                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    i--;
                }
            }

            score += 0.05;
            gameSpeed += 0.002; // Oyun gittikçe hızlanır
            frames++;
        }

        // Oyunu Başlat / Yeniden Başlat
        function resetGame() {
            obstacles.length = 0;
            score = 0;
            frames = 0;
            gameSpeed = 5;
            dino.y = 100;
            dino.dy = 0;
            isGameOver = false;
            gameOverText.style.display = 'none';
            animateDinoGame();
        }

        // Kontroller
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (isGameOver) {
                    resetGame();
                } else {
                    dino.jump();
                }
            }
        });

        document.getElementById('game-container').addEventListener('mousedown', () => {
             if (isGameOver) {
                resetGame();
            } else {
                dino.jump();
            }
        });

        // Oyunu İlk Açılışta Başlat
        animateDinoGame();
    </script>
</body>
</html>
