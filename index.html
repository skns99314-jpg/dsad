<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOBAK CHAT EKRANI</title>
    <style>
        /* Genel Ayarlar ve Siber Tema */
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #00ffff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            user-select: none;
        }

        /* Matrix Arka Plan */
        canvas#matrix {
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* Kocaman Başlık */
        .title-container {
            z-index: 1;
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 4.5rem;
            margin: 0;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #0099ff, 0 0 40px #0099ff;
            letter-spacing: 2px;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 10px #00ffff, 0 0 20px #0099ff; transform: scale(1); }
            100% { text-shadow: 0 0 20px #00ffff, 0 0 40px #0099ff, 0 0 60px #00ffff; transform: scale(1.02); }
        }

        /* Dinazor Oyunu Alanı */
        #game {
            width: 600px;
            height: 200px;
            border: 3px solid #00ffff;
            border-radius: 10px;
            position: relative;
            background-color: rgba(0, 20, 40, 0.6);
            z-index: 1;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        /* Dinazor (Kare) */
        #dino {
            width: 40px;
            height: 40px;
            background-color: #00ffff;
            position: absolute;
            top: 160px;
            left: 50px;
            box-shadow: 0 0 15px #00ffff;
            border-radius: 5px;
        }

        /* Engel (Kaktüs) */
        #cactus {
            width: 20px;
            height: 40px;
            background-color: #ff3300; /* Çarpıcı turuncu/kırmızı */
            position: absolute;
            top: 160px;
            left: 600px;
            box-shadow: 0 0 10px #ff3300;
            border-radius: 3px;
        }

        /* Zıplama Animasyonu */
        .jump {
            animation: jumpAnim 0.6s linear;
        }

        @keyframes jumpAnim {
            0% { top: 160px; }
            40% { top: 60px; }
            50% { top: 60px; }
            60% { top: 60px; }
            100% { top: 160px; }
        }

        /* Engel Hareketi */
        .move {
            animation: moveAnim 1.2s infinite linear;
        }

        @keyframes moveAnim {
            0% { left: 600px; }
            100% { left: -20px; }
        }

        /* Skor ve Mesajlar */
        #scoreBoard {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 5px #00ffff;
        }

        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            color: #ff3300;
            font-weight: bold;
            text-shadow: 0 0 10px #ff0000;
            display: none;
            text-align: center;
        }
        
        .start-text {
            position: absolute;
            bottom: -30px;
            font-size: 1.2rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <!-- Arka Plan Efekti -->
    <canvas id="matrix"></canvas>

    <!-- Ana Başlık -->
    <div class="title-container">
        <h1>GOBAK CHATİ AÇSAKMI YA :D</h1>
    </div>

    <!-- Oyun Alanı -->
    <div id="game">
        <div id="scoreBoard">Skor: <span id="score">0</span></div>
        <div id="message">YANDIN!<br>Tekrar başlamak için tıkla</div>
        <div id="dino"></div>
        <div id="cactus"></div>
    </div>
    <div class="start-text">Zıplamak için BOŞLUK (Space) tuşuna bas!</div>

    <script>
        // --- MATRİX ARKA PLAN EFEKTİ ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array.from({ length: columns }).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0f0'; // Varsayılan renk ayarlıyoruz ama aşağıda değiştireceğiz
            ctx.font = fontSize + 'px Courier New';

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                // Siber tema için renk (Mavi - Camgöbeği)
                ctx.fillStyle = Math.random() > 0.5 ? '#00ffff' : '#0077ff'; 
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // --- DİNAZOR OYUNU ---
        const dino = document.getElementById("dino");
        const cactus = document.getElementById("cactus");
        const scoreElement = document.getElementById("score");
        const message = document.getElementById("message");
        
        let isJumping = false;
        let isGameOver = false;
        let score = 0;
        let scoreInterval;

        function jump() {
            if (isJumping || isGameOver) return;
            isJumping = true;
            dino.classList.add("jump");
            setTimeout(() => {
                dino.classList.remove("jump");
                isJumping = false;
            }, 600); // CSS animasyon süresi ile eşleşmeli
        }

        function startGame() {
            if (!isGameOver && cactus.classList.contains("move")) return;
            
            isGameOver = false;
            score = 0;
            scoreElement.innerText = score;
            message.style.display = "none";
            cactus.style.left = "600px";
            cactus.classList.add("move");

            clearInterval(scoreInterval);
            scoreInterval = setInterval(() => {
                score++;
                scoreElement.innerText = score;
            }, 100);
        }

        function gameOver() {
            isGameOver = true;
            cactus.classList.remove("move");
            message.style.display = "block";
            clearInterval(scoreInterval);
        }

        // Çarpışma Kontrolü
        setInterval(() => {
            if (isGameOver) return;

            let dinoTop = parseInt(window.getComputedStyle(dino).getPropertyValue("top"));
            let cactusLeft = parseInt(window.getComputedStyle(cactus).getPropertyValue("left"));

            // Dinazor ile kaktüs çarpışıyorsa (x ve y ekseninde)
            if (cactusLeft < 90 && cactusLeft > 50 && dinoTop >= 120) {
                gameOver();
            }
        }, 10);

        // Kontroller
        document.addEventListener("keydown", function(event) {
            if (event.code === "Space") {
                if (isGameOver) {
                    startGame();
                } else {
                    jump();
                }
            }
        });

        document.addEventListener("mousedown", function() {
            if (isGameOver) {
                startGame();
            } else {
                jump();
            }
        });

        // Sayfa yüklendiğinde kaktüsü hareket ettir
        cactus.classList.add("move");
        startGame();
    </script>
</body>
</html>
